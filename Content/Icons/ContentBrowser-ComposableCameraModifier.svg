  <circle cx="37" cy="37" r="7" fill="white" opacity="0.9"/>
  <circle cx="37" cy="37" r="3.5" fill="#A05AC8" opacity="0.85"/>
  <!-- Gear teeth -->
  <rect x="35.5" y="28.5" width="3" height="3" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="35.5" y="42.5" width="3" height="3" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="28.5" y="35.5" width="3" height="3" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="42.5" y="35.5" width="3" height="3" rx="0.5" fill="white" opacity="0.9"/>
  <!-- Wrench accent lines inside gear -->
  <line x1="35" y1="35" x2="39" y2="39" stroke="#A05AC8" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="39" y1="35" x2="35" y2="39" stroke="#A05AC8" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
</svg>
